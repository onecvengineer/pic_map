services:
  web-api:
    build: .
    ports:
      - "${PORT:-5173}:5173"
    environment:
      PORT: 5173
      HOST: 0.0.0.0
      DATA_DIR: /app/data
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      AMAP_KEY: ${AMAP_KEY:-}
      INFERENCE_WINDOW_MINUTES: ${INFERENCE_WINDOW_MINUTES:-30}
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres-postgis

  postgres-postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-picmap}
      POSTGRES_USER: ${POSTGRES_USER:-picmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

volumes:
  postgres-data:
